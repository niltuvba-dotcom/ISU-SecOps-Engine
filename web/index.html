<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-OPS Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>SEC-OPS <span class="neon-text">ENGINE</span></h1>
            <p>Advanced Service Fingerprinting Dashboard</p>
        </header>

        <main>
            <form id="scan-form">
                <div class="input-group">
                    <label for="target">Target (IP or Domain)</label>
                    <input type="text" id="target" placeholder="e.g. scanme.nmap.org" required value="scanme.nmap.org">
                </div>
                <div class="input-group">
                    <label for="ports">Ports (Comma separated)</label>
                    <input type="text" id="ports" placeholder="e.g. 22,80,443,3306" required value="22,80,443">
                </div>
                <button type="submit" id="btn-scan" class="primary-btn">
                    <span class="btn-text">Initiate Scan</span>
                    <div class="loader hidden"></div>
                </button>
            </form>

            <div id="results-container" class="hidden">
                <div class="results-header">
                    <h2>Scan Results</h2>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Search targets, ports, or services...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th>Target</th>
                                <th>Port</th>
                                <th>State</th>
                                <th>Service</th>
                                <th>Version</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="error-message" class="hidden"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
